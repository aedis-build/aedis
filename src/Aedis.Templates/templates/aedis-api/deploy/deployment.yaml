# Deployment endurecido para AedisApi1: non-root, root FS read-only, drop de capabilities,
# no-new-privileges e seccomp default. Probes apontam para os endpoints de health do AedisApiHost.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aedisapi1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aedisapi1
  template:
    metadata:
      labels:
        app: aedisapi1
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: registry.example.com/aedisapi1:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            privileged: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
      volumes:
        - name: tmp
          emptyDir: {}
