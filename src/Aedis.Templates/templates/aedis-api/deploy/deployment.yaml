# Manifesto endurecido: non-root, filesystem read-only, sem escalonamento de privilégio,
# capabilities zeradas e seccomp RuntimeDefault. Ajuste imagem, réplicas e recursos conforme seu cluster.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aedis.app1
  labels:
    app: aedis.app1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aedis.app1
  template:
    metadata:
      labels:
        app: aedis.app1
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: aedis.app1:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ "ALL" ]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: aedis.app1
spec:
  selector:
    app: aedis.app1
  ports:
    - port: 80
      targetPort: 8080
