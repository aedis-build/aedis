# Manifesto endurecido do worker: non-root, filesystem read-only, sem escalonamento de privilégio,
# capabilities zeradas e seccomp RuntimeDefault. O worker não expõe API pública — só o health probe.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aedis.app1
  labels:
    app: aedis.app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aedis.app1
  template:
    metadata:
      labels:
        app: aedis.app1
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: aedis.app1:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: [ "ALL" ]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
