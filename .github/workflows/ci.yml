name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Aedis.slnx

      - name: Build
        run: dotnet build Aedis.slnx -c Release --no-restore

      - name: Test
        run: dotnet test Aedis.slnx -c Release --no-build --verbosity normal
