name: Templates

# Empacota, valida (E2E real) e publica os templates `dotnet new` do Aedis.
# A validação vai além da instanciação: empacota a solução num feed local e dá build + test no app
# gerado pelo aedis-api, garantindo que o template compila contra os pacotes Aedis reais.

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Aedis.Templates/**'
      - 'src/Aedis.Hosting.AspNetCore/**'
      - '.github/workflows/templates.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/Aedis.Templates/**'
      - 'src/Aedis.Hosting.AspNetCore/**'
  release:
    types: [ published ]

permissions:
  contents: read

env:
  FEED: ${{ github.workspace }}/artifacts/feed

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verificar sincronia de versão (templates vs framework)
        run: |
          PREFIX="$(grep -oP '(?<=<VersionPrefix>)[^<]+' Directory.Build.props)"
          SUFFIX="$(grep -oP '(?<=<VersionSuffix>)[^<]+' Directory.Build.props)"
          if [ -n "$SUFFIX" ]; then FRAMEWORK="$PREFIX-$SUFFIX"; else FRAMEWORK="$PREFIX"; fi
          echo "Versão do framework: $FRAMEWORK"
          MISMATCH=0
          for f in src/Aedis.Templates/templates/*/.template.config/template.json; do
            DEF="$(grep -oP '(?<="defaultValue": ")[^"]+' "$f" || true)"
            if [ -n "$DEF" ] && [ "$DEF" != "$FRAMEWORK" ]; then
              echo "::error file=$f::AedisVersion default '$DEF' != framework '$FRAMEWORK'"
              MISMATCH=1
            fi
          done
          if [ "$MISMATCH" -ne 0 ]; then
            echo "Atualize o defaultValue de AedisVersion nos templates para casar com o framework."
            exit 1
          fi

      - name: Pack da solução (feed local)
        run: dotnet pack Aedis.slnx -c Release -o "$FEED"

      - name: Verificar pacotes essenciais no feed
        run: |
          REQUIRED="Aedis.Templates Aedis.Domain Aedis.Commands Aedis.Exceptions Aedis.Database.Abstractions Aedis.Database.Postgres Aedis.Hosting.AspNetCore Aedis.Security Aedis.Security.Keycloak Aedis.Hosting.Worker"
          for p in $REQUIRED; do
            ls "$FEED/$p."*.nupkg >/dev/null 2>&1 || { echo "::error::pacote essencial ausente no feed: $p"; exit 1; }
          done

      - name: Instalar e instanciar (api/worker/lib)
        run: |
          dotnet new install "$FEED"/Aedis.Templates.*.nupkg
          dotnet new aedis-api -n Smoke -o /tmp/smoke-api
          dotnet new aedis-worker -n SmokeWorker -o /tmp/smoke-worker
          dotnet new aedis-lib -n SmokeLib -o /tmp/smoke-lib
          test -f /tmp/smoke-api/Smoke.slnx
          test -f /tmp/smoke-api/src/Smoke.Api/Controllers/ProductsController.cs
          test -f /tmp/smoke-worker/SmokeWorker.csproj
          test -f /tmp/smoke-lib/SmokeLib.csproj
          if grep -rqE "Aedis\.App1|AedisWorker1|AedisLibrary1|AEDIS_PKG_VERSION|aedis\.app1" /tmp/smoke-api /tmp/smoke-worker /tmp/smoke-lib; then
            echo "::error::placeholder não substituído nos projetos gerados"
            exit 1
          fi

      - name: Build + test do app gerado (contra o feed)
        run: |
          cat > /tmp/smoke-api/nuget.config <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <configuration>
            <packageSources>
              <clear />
              <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              <add key="aedis-local" value="$FEED" />
            </packageSources>
          </configuration>
          EOF
          dotnet build /tmp/smoke-api/Smoke.slnx -c Release
          dotnet test /tmp/smoke-api/Smoke.slnx -c Release --no-build

      - name: Publicar no NuGet (release)
        if: github.event_name == 'release'
        run: dotnet nuget push "$FEED"/Aedis.Templates.*.nupkg --source https://api.nuget.org/v3/index.json --api-key "${{ secrets.NUGET_API_KEY }}" --skip-duplicate
